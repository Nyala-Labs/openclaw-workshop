# OpenClaw workshop stack: gateway runs ONLY in this container (see Dockerfile CMD).
# Stop any local `openclaw gateway` on the host before `up`, or port 18789 will conflict.
# Host TUI connects to localhost:18789 → container gateway; execution jail is ./agent_workspace.
services:
  openclaw-agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: openclaw-workshop-agent:local
    container_name: openclaw-workshop-agent
    working_dir: /app
    env_file:
      - .env
    environment:
      # Explicit jail path inside container (skills resolve against this)
      OPENCLAW_WORKSPACE_ROOT: /workspace
      OPENCLAW_SKILLS_DIR: /app/skills
      OPENCLAW_PROMPTS_DIR: /app/prompts
      OPENCLAW_LOGS_DIR: /var/log/openclaw
    ports:
      # OpenClaw gateway — host CLI / `openclaw tui` connects here when the gateway runs in this service
      - "18789:18789"
    volumes:
      # Execution sandbox — agent file I/O is restricted here by skills + policy
      - ./agent_workspace:/workspace:rw
      # Skill code (read-only in production; rw for local iteration)
      - ./skills:/app/skills:rw
      # Prompts
      - ./prompts:/app/prompts:ro
      # Audit trail (host-backed)
      - ./logs:/var/log/openclaw:rw
      # Optional: mount repo root for workshop exercises
      - ./openclaw.yaml:/app/openclaw.yaml:ro
    # Gateway starts via Dockerfile CMD (`openclaw gateway run …`)
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL